name: build

on:
  push:
    branches: ["main", "claude/**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "릴리스로 게시할 태그 (예: v0.2.0-alpha.1). 비우면 빌드만 수행."
        required: false
        default: ""

jobs:
  server:
    name: 서버 (Go, linux + windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: 빌드 (리눅스 + 윈도우 크로스 컴파일)
        working-directory: server
        env:
          CGO_ENABLED: "0"
        run: |
          go vet ./...
          LD="-s -w -X main.version=${GITHUB_SHA::8}"
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags "$LD" -o ../dist/volt-server .
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags "$LD" -o ../dist/volt-server.exe .

      - name: 아티팩트 업로드 (리눅스)
        uses: actions/upload-artifact@v4
        with:
          name: volt-server-linux-amd64
          path: dist/volt-server
          if-no-files-found: error

      - name: 아티팩트 업로드 (윈도우)
        uses: actions/upload-artifact@v4
        with:
          name: volt-server-windows-amd64
          path: dist/volt-server.exe
          if-no-files-found: error

  client:
    name: 클라이언트 (Windows, 단일 exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: 단일 exe 퍼블리시
        run: >
          dotnet publish client/VoltComms/VoltComms.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -o dist

      - name: 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: VoltComms-win-x64
          path: dist/VoltComms.exe
          if-no-files-found: error

  # 릴리스 게시 — 두 가지 방법으로 동작한다:
  #  1) v* 태그를 푸시 → 그 태그로 릴리스
  #  2) 수동 실행(workflow_dispatch)에서 release_tag 입력 → CI 토큰이 태그를
  #     해당 커밋에 만들고 릴리스. (로컬에서 태그 푸시가 막힌 환경 우회용)
  release:
    name: 릴리스 게시
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.release_tag != '' }}
    needs: [server, client]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REL_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.REL_TAG }}
          target_commitish: ${{ github.sha }}
          # 하이픈이 든 태그(v0.2.0-alpha.1 등)는 사전 릴리스로 표시해
          # 정식 'Latest release' 자리를 차지하지 않게 한다.
          prerelease: ${{ contains(env.REL_TAG, '-') }}
          generate_release_notes: true
          files: |
            artifacts/volt-server-linux-amd64/volt-server
            artifacts/volt-server-windows-amd64/volt-server.exe
            artifacts/VoltComms-win-x64/VoltComms.exe
